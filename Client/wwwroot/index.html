    <!-- Complete Browser Link CORS error suppression -->
    <script>
        // Comprehensive Browser Link error suppression for development
        if (window.location.hostname === 'localhost') {
            // Override console methods to filter Browser Link errors
            const originalError = console.error;
            const originalWarn = console.warn;
            const originalLog = console.log;
            
            const isBrowserLinkError = (message) => {
                if (typeof message === 'string') {
                    return message.includes('browserLinkSignalR') ||
                           message.includes('negotiate?clientProtocol') ||
                           message.includes('Cross-Origin Request Blocked') ||
                           message.includes('CORS request did not succeed') ||
                           (message.includes('localhost') && /:\d{5}\/[a-f0-9-]+\/browserLink/.test(message));
                }
                return false;
            };

            console.error = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalError.apply(console, [message, ...args]);
                }
            };

            console.warn = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalWarn.apply(console, [message, ...args]);
                }
            };

            // Suppress fetch errors for Browser Link
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string' && url.includes('browserLinkSignalR')) {
                    // Return a rejected promise silently
                    return Promise.reject(new Error('Browser Link request suppressed'));
                }
                return originalFetch.apply(window, [url, options]);
            };

            // Block Browser Link WebSocket connections
            const OriginalWebSocket = window.WebSocket;
            window.WebSocket = function(url, protocols) {
                if (typeof url === 'string' && url.includes('browserLink')) {
                    console.log('Browser Link WebSocket connection blocked');
                    throw new Error('Browser Link WebSocket blocked');
                }
                return new OriginalWebSocket(url, protocols);
            };

            console.log('[Browser Link Suppression] Browser Link CORS errors are being filtered out');
        }
    </script>

    <script>
        window.hardReload = () => {

        window.fireConfetti = () => {
            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none';
            document.body.appendChild(canvas);

            const myConfetti = confetti.create(canvas, { resize: true, useWorker: false });
            const duration = 3000;
            const end = Date.now() + duration;
            const colors = ['#ffd700', '#ff8c00', '#ff69b4', '#9b59b6', '#3498db'];

            (function frame() {
                myConfetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });
                myConfetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors });
                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                } else {
                    // Stop spawning; let existing particles fall off naturally, then clean up
                    setTimeout(() => { myConfetti.reset(); if (canvas.parentNode) canvas.remove(); }, 3000);
                }
            }());
        };

        window.playSound = (src, volume) => {
            console.log(`playing sound ${src}`);
            var audio = new Audio(src);
            audio.play();
        }

        window.showModal = (modalId) => {
            const modalElement = document.getElementById(modalId);
            if (modalElement) {
                const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
                modal.show();
            }
        }

        window.hideModal = (modalId) => {
            const modalElement = document.getElementById(modalId);
            if (modalElement) {
                const modal = bootstrap.Modal.getInstance(modalElement);
                if (modal) {
                    modal.hide();
                } else {
                    // Fallback: manually remove modal classes and backdrop
                    modalElement.classList.remove('show');
                    modalElement.style.display = 'none';
                    modalElement.setAttribute('aria-hidden', 'true');
                    modalElement.removeAttribute('aria-modal');
                    modalElement.removeAttribute('role');
                    
                    // Remove any remaining backdrops
                    const backdrops = document.querySelectorAll('.modal-backdrop');
                    backdrops.forEach(backdrop => backdrop.remove());
                    
                    // Restore body scroll
                    document.body.classList.remove('modal-open');
                    document.body.style.overflow = '';
                    document.body.style.paddingRight = '';
                }
            }
        }

            });

        };
