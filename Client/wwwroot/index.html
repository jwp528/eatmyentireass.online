    <!-- Complete Browser Link CORS error suppression -->
    <script>
        // Comprehensive Browser Link error suppression for development
        if (window.location.hostname === 'localhost') {
            // Override console methods to filter Browser Link errors
            const originalError = console.error;
            const originalWarn = console.warn;
            const originalLog = console.log;
            
            const isBrowserLinkError = (message) => {
                if (typeof message === 'string') {
                    return message.includes('browserLinkSignalR') ||
                           message.includes('negotiate?clientProtocol') ||
                           message.includes('Cross-Origin Request Blocked') ||
                           message.includes('CORS request did not succeed') ||
                           (message.includes('localhost') && /:\d{5}\/[a-f0-9-]+\/browserLink/.test(message));
                }
                return false;
            };

            console.error = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalError.apply(console, [message, ...args]);
                }
            };

            console.warn = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalWarn.apply(console, [message, ...args]);
                }
            };

            // Suppress fetch errors for Browser Link
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string' && url.includes('browserLinkSignalR')) {
                    // Return a rejected promise silently
                    return Promise.reject(new Error('Browser Link request suppressed'));
                }
                return originalFetch.apply(window, [url, options]);
            };

            // Block Browser Link WebSocket connections
            const OriginalWebSocket = window.WebSocket;
            window.WebSocket = function(url, protocols) {
                if (typeof url === 'string' && url.includes('browserLink')) {
                    console.log('Browser Link WebSocket connection blocked');
                    throw new Error('Browser Link WebSocket blocked');
                }
                return new OriginalWebSocket(url, protocols);
            };

            console.log('[Browser Link Suppression] Browser Link CORS errors are being filtered out');
        }
    </script>

        // ── WebGL border fire effect (v5: CodeSandbox mBBS technique) ────────
        (function () {
            var _s = {

                uTime: null, uRes: null, uNZW: null, uFire: null,

            var VS = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';

            // Fragment shader — near-verbatim port of the CodeSandbox fire shader
            // adapted from https://codesandbox.io/p/sandbox/affectionate-jennings-lb78iq
            var FS = [
                'precision mediump float;',
                'uniform float u_time;',
                'uniform vec2 u_res;',
                'uniform sampler2D u_nzw;',    // noise.png  — mBBS gradient noise
                'uniform sampler2D u_fire;',   // texture.png — fire profile color ramp

                // Constants — magnitude reduced for directional flamethrower look
                'const float lacunarity=2.0;',
                'const float gain=0.5;',
                'const float magnitude=0.65;',
                'const float modulus=61.0;',

                // Modified Blum Blum Shub (verbatim from CodeSandbox)
                'vec2 mBBS(vec2 val,float mod_){val=mod(val,mod_);return mod(val*val,mod_);}',

                // Modified noise (verbatim from CodeSandbox)
                'float mnoise(vec3 pos){',
                '  float iz=floor(pos.z),fz=fract(pos.z);',
                '  vec2 hash=mBBS(iz*3.0+vec2(0.0,3.0),modulus);',
                '  vec4 g=vec4(',
                '    texture2D(u_nzw,vec2(pos.x,pos.y+hash.x)/modulus).xy,',
                '    texture2D(u_nzw,vec2(pos.x,pos.y+hash.y)/modulus).xy)*2.0-1.0;',
                '  return mix(g.x+g.y*fz,g.z+g.w*(fz-1.0),smoothstep(0.0,1.0,fz));}',

                // Turbulence: abs() sums create ridged/spiky fire shapes (key difference vs fBm)
                'float turbulence(vec3 pos){',
                '  float v=0.0,f=1.0,a=1.0;',
                '  for(int i=0;i<4;i++){v+=abs(mnoise(pos*f))*a;f*=lacunarity;a*=gain;}',
                '  return v;}',

                // Sample fire for one screen edge
                // d = depth from edge into border zone (0=screen edge, 1=inner boundary)
                // a = position along edge (0..1)
                // t = time (phase-offset per edge)
                'vec4 sampleEdge(float d,float a,float t){',
                '  if(d>=1.0)return vec4(0.0);',

                // Noise space: fast upward scroll (flamethrower), tight lateral variation
                // t*10.0 = very fast upward movement, a*0.6 = tight streaks, t*1.5 = Z drift
                '  vec3 np=vec3(a*0.6,d*2.0-t*10.0,t*1.5);',

                // Height-scaled turbulence (verbatim from CodeSandbox: sqrt(height)*magnitude)
                '  float offset=sqrt(d)*magnitude*turbulence(np);',
                '  float h=d+offset;',

                // Outside flame tip → transparent
                '  if(h>1.0)return vec4(0.0);',

                // Sample fire profile texture at (center-column, height)
                '  vec4 result=texture2D(u_fire,vec2(0.5,h));',

                // Fade near the base to avoid abrupt start (from CodeSandbox)
                '  if(h<0.1)result*=h/0.1;',

                '  return result;}',

                'void main(){',
                '  vec2 uv=gl_FragCoord.xy/u_res;',
                '  float brd=0.15;',
                '  float dB=uv.y/brd,dT=(1.0-uv.y)/brd,dL=uv.x/brd,dR=(1.0-uv.x)/brd;',
                '  if(min(min(dB,dT),min(dL,dR))>=1.0){gl_FragColor=vec4(0.0);return;}',
                '  float t=u_time;',
                // Composite all 4 edges; staggered time offsets keep each edge independent
                '  vec4 fc=max(max(sampleEdge(dB,uv.x,t),sampleEdge(dT,1.0-uv.x,t+5.7)),',
                '             max(sampleEdge(dL,1.0-uv.y,t+11.3),sampleEdge(dR,uv.y,t+17.1)));',
                '  gl_FragColor=fc;}',
            ].join('\n');

            function compile(gl, type, src) {
                var s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
                    console.error('[Fire shader]', gl.getShaderInfoLog(s));
                return s;
            }

            function uploadTexture(gl, img, wrap) {
                var tex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, tex);
                gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, wrap);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, wrap);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                return tex;
            }

            function initGL(canvas) {
                _s.gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false })
                    || canvas.getContext('experimental-webgl', { alpha: true, premultipliedAlpha: false });
                if (!_s.gl) return false;
                var gl = _s.gl;
                var vs = compile(gl, gl.VERTEX_SHADER, VS);
                var fs = compile(gl, gl.FRAGMENT_SHADER, FS);
                _s.prog = gl.createProgram();
                gl.attachShader(_s.prog, vs); gl.attachShader(_s.prog, fs);
                gl.linkProgram(_s.prog);
                gl.deleteShader(vs); gl.deleteShader(fs);
                gl.useProgram(_s.prog);
                _s.buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, _s.buf);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
                var ap = gl.getAttribLocation(_s.prog, 'p');
                gl.enableVertexAttribArray(ap);
                gl.vertexAttribPointer(ap, 2, gl.FLOAT, false, 0, 0);
                _s.uTime = gl.getUniformLocation(_s.prog, 'u_time');
                _s.uRes = gl.getUniformLocation(_s.prog, 'u_res');
                _s.uNZW = gl.getUniformLocation(_s.prog, 'u_nzw');
                _s.uFire = gl.getUniformLocation(_s.prog, 'u_fire');
                // Upload textures (images preloaded at IIFE init time)
                if (_imgs.noise) _s.texNoise = uploadTexture(gl, _imgs.noise, gl.REPEAT);
                if (_imgs.fire) _s.texFire = uploadTexture(gl, _imgs.fire, gl.CLAMP_TO_EDGE);
                // Bind sampler uniforms to texture units 0 and 1
                gl.uniform1i(_s.uNZW, 0);
                gl.uniform1i(_s.uFire, 1);
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
                gl.clearColor(0, 0, 0, 0);
                return true;
            }

            function resize() {
                if (!_s.canvas || !_s.gl) return;
                var par = _s.canvas.parentElement;
                if (!par) return;
                var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
                var w = Math.floor(par.clientWidth * dpr) || 1;
                var h = Math.floor(par.clientHeight * dpr) || 1;
                if (_s.canvas.width !== w || _s.canvas.height !== h) {
                    _s.canvas.width = w; _s.canvas.height = h;
                    _s.gl.viewport(0, 0, w, h);
                }
            }

            function render() {
                if (!_s.running || !_s.gl) return;
                var gl = _s.gl;
                var t = (performance.now() - _s.t0) / 1000;
                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.uniform1f(_s.uTime, t);
                gl.uniform2f(_s.uRes, _s.canvas.width, _s.canvas.height);
                // Bind noise texture to unit 0, fire profile to unit 1
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, _s.texNoise);
                gl.activeTexture(gl.TEXTURE1);
                gl.bindTexture(gl.TEXTURE_2D, _s.texFire);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                _s.raf = requestAnimationFrame(render);

                if (_s.running) return; // idempotent
                var c = document.getElementById(canvasId);
                if (!c) { console.warn('[Fire] canvas not found:', canvasId); return; }

                c.style.display = 'block';

                resize();
                if (window.ResizeObserver) {
                    _s.obs = new ResizeObserver(resize);
                    _s.obs.observe(c.parentElement);
                } else {
                    window.addEventListener('resize', resize);
                }
                _s.running = true;
                _s.t0 = performance.now();
                _s.raf = requestAnimationFrame(render);
            };

            window.stopFireEffect = function () {
                if (!_s.running) return; // idempotent
                _s.running = false;
                if (_s.raf) { cancelAnimationFrame(_s.raf); _s.raf = null; }
                if (_s.obs) { _s.obs.disconnect(); _s.obs = null; }
                else { window.removeEventListener('resize', resize); }

            };

            window.destroyFireEffect = function () {
                window.stopFireEffect();
                if (_s.gl) {
                    if (_s.buf) { _s.gl.deleteBuffer(_s.buf); _s.buf = null; }
                    if (_s.prog) { _s.gl.deleteProgram(_s.prog); _s.prog = null; }
                    if (_s.texNoise) { _s.gl.deleteTexture(_s.texNoise); _s.texNoise = null; }

        // ── Fart cloud transition (splash → app) ──────────────────────────────
        (function () {
            var _f = {
                canvas: null, gl: null, prog: null, buf: null,
                uT: null, uR: null, raf: null, running: false,
                t0: 0, onPeak: null, peakFired: false
            };

            var VS_FC = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';

            // Fart cloud shader:
            //  - Dense fog base (0.88-1.00) guarantees full-screen opacity at peak
            //  - 7 turbulent blobs rising from below for the gassy look
            //  - Olive-green palette
            var FS_FC = [
                'precision mediump float;',
                'uniform float u_t;uniform vec2 u_r;',
                // IQ-style fract hash — mediump-safe
                'float h(vec2 p){p=fract(p*vec2(.3183,.3678));p*=17.;return fract(p.x*p.y*(p.x+p.y));}',
                // Value noise
                'float n(vec2 p){vec2 i=floor(p),f=p-i;f=f*f*(3.-2.*f);',
                '  return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
                // 3-octave fBm
                'float fbm(vec2 p){return .5*n(p)+.25*n(p*2.1+vec2(1.7,9.2))+.125*n(p*4.3+vec2(5.2,3.1));}',
                // Blob: uv [0,1], aspect-corrected distance, rises over time
                'float blob(vec2 uv,float ar,float cx,float cy,float dt,float r){',
                '  if(dt<=0.)return 0.;',
                '  float g=min(dt*2.5,1.);',
                '  vec2 d=vec2((uv.x-cx)*ar,uv.y-(cy+dt*.09));',
                '  float turb=n(uv*4.5+vec2(dt*.7,-dt*.9));',
                '  float rad=r*g*(0.76+0.46*turb);',
                '  return 1.-smoothstep(0.,rad,length(d));}',
                'void main(){',
                '  vec2 uv=gl_FragCoord.xy/u_r;',
                '  float ar=u_r.x/u_r.y;',
                // Time envelope: build 0→0.45s, hold, fade 1.1→2.8s
                '  float bld=clamp(u_t/.45,0.,1.);',
                '  float fde=u_t>1.1?clamp(1.-(u_t-1.1)/1.7,0.,1.):1.;',
                '  float ga=bld*fde;',
                // Dense fog base — guarantees full opacity everywhere at peak
                '  float fog=0.88+0.12*n(uv*2.+vec2(u_t*.09,-u_t*.06));',
                // 7 fart pockets rising from various positions
                '  float c=fog;',
                '  c+=blob(uv,ar,0.50,0.08,u_t,     0.55)*0.2;',
                '  c+=blob(uv,ar,0.25,0.18,u_t-.07, 0.42)*0.2;',
                '  c+=blob(uv,ar,0.75,0.18,u_t-.05, 0.42)*0.2;',
                '  c+=blob(uv,ar,0.50,0.46,u_t-.18, 0.46)*0.2;',
                '  c+=blob(uv,ar,0.10,0.40,u_t-.12, 0.36)*0.2;',
                '  c+=blob(uv,ar,0.90,0.40,u_t-.10, 0.36)*0.2;',
                '  c+=blob(uv,ar,0.50,0.72,u_t-.28, 0.40)*0.2;',
                '  c=clamp(c,0.,1.);',
                // Fart palette: dark swampy green → golden olive
                '  float cv=fbm(uv*2.5+vec2(u_t*.1,u_t*.07));',
                '  vec3 col=mix(vec3(.16,.26,.04),mix(vec3(.40,.52,.10),vec3(.60,.56,.14),max(cv*2.-1.,0.)),cv);',
                '  gl_FragColor=vec4(col,c*ga);}',
            ].join('\n');

            function initFartGL(c) {
                var gl = c.getContext('webgl', { alpha: true, premultipliedAlpha: false })
                    || c.getContext('experimental-webgl', { alpha: true, premultipliedAlpha: false });
                if (!gl) return false;
                _f.gl = gl;
                function sh(type, src) {
                    var s = gl.createShader(type);
                    gl.shaderSource(s, src); gl.compileShader(s);
                    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
                        console.warn('[Fart shader]', gl.getShaderInfoLog(s));
                    return s;
                }
                _f.prog = gl.createProgram();
                gl.attachShader(_f.prog, sh(gl.VERTEX_SHADER, VS_FC));
                gl.attachShader(_f.prog, sh(gl.FRAGMENT_SHADER, FS_FC));
                gl.linkProgram(_f.prog);
                gl.useProgram(_f.prog);
                _f.buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, _f.buf);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
                var ap = gl.getAttribLocation(_f.prog, 'p');
                gl.enableVertexAttribArray(ap);
                gl.vertexAttribPointer(ap, 2, gl.FLOAT, false, 0, 0);
                _f.uT = gl.getUniformLocation(_f.prog, 'u_t');
                _f.uR = gl.getUniformLocation(_f.prog, 'u_r');
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
                gl.clearColor(0, 0, 0, 0);
                return true;
            }

            function fartFrame() {
                if (!_f.running || !_f.gl) return;
                var t = (performance.now() - _f.t0) / 1000;
                var gl = _f.gl, c = _f.canvas;
                // Half-res canvas for performance; CSS stretches it to full screen
                var w = Math.round(window.innerWidth * 0.55) || 480;
                var h = Math.round(window.innerHeight * 0.55) || 300;
                if (c.width !== w || c.height !== h) {
                    c.width = w; c.height = h;
                    gl.viewport(0, 0, w, h);
                }
                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.uniform1f(_f.uT, t);
                gl.uniform2f(_f.uR, w, h);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                // Fire the peak callback when clouds are at full density
                if (!_f.peakFired && t >= 0.55 && _f.onPeak) {
                    _f.peakFired = true;
                    _f.onPeak();
                }
                if (t >= 3.0) {
                    _f.running = false;
                    c.style.display = 'none';
                    return;
                }
                _f.raf = requestAnimationFrame(fartFrame);
            }

            function spawnFartEmoji() {
                var cast = ['💨', '💨', '💨', '🍑', '💨', '💨', '🟢', '💨'];
                cast.forEach(function (em, i) {
                    setTimeout(function () {
                        var el = document.createElement('span');
                        el.textContent = em;
                        var sz = 18 + Math.random() * 22;
                        var lx = 8 + Math.random() * 84;
                        var rot = ((Math.random() - 0.5) * 50).toFixed(1);
                        el.setAttribute('style',
                            'position:fixed;font-size:' + sz + 'px;left:' + lx + 'vw;bottom:8vh;' +
                            'z-index:10001;pointer-events:none;opacity:0.88;' +
                            '--fart-rot:' + rot + 'deg;' +
                            'animation:fart-emoji-rise 2.3s ease-out forwards');
                        document.body.appendChild(el);
                        setTimeout(function () { if (el.parentNode) el.remove(); }, 2600);
                    }, i * 110 + Math.random() * 60);
                });
            }

            window.playFartTransition = function (onPeak) {
                var c = document.getElementById('fart-canvas');
                if (!c) { if (onPeak) onPeak(); return; }
                _f.canvas = c;
                _f.onPeak = onPeak;
                _f.peakFired = false;
                c.style.display = 'block';
                if (!_f.gl && !initFartGL(c)) {
                    c.style.display = 'none';
                    if (onPeak) onPeak();
                    return;
                }
                _f.running = true;
                _f.t0 = performance.now();
                spawnFartEmoji();
                _f.raf = requestAnimationFrame(fartFrame);
            };
        })();

        // Called by Blazor's MainLayout on first render — guaranteed timing
        window.triggerSplashTransition = function () {
            window.playFartTransition(function () {
                var splash = document.getElementById('emea-splash');
                if (splash) {
                    splash.style.transition = 'opacity 0.25s ease';
                    splash.style.opacity = '0';
                    setTimeout(function () { if (splash.parentNode) splash.remove(); }, 300);
                }
            });
        };

        // Safety net: if Blazor never calls triggerSplashTransition, hide splash after 12s
        setTimeout(function () {
            var splash = document.getElementById('emea-splash');
            if (splash) { splash.style.display = 'none'; }
        }, 12000);
    </script>
