    <!-- Complete Browser Link CORS error suppression -->
    <script>
        // Comprehensive Browser Link error suppression for development
        if (window.location.hostname === 'localhost') {
            // Override console methods to filter Browser Link errors
            const originalError = console.error;
            const originalWarn = console.warn;
            const originalLog = console.log;
            
            const isBrowserLinkError = (message) => {
                if (typeof message === 'string') {
                    return message.includes('browserLinkSignalR') ||
                           message.includes('negotiate?clientProtocol') ||
                           message.includes('Cross-Origin Request Blocked') ||
                           message.includes('CORS request did not succeed') ||
                           (message.includes('localhost') && /:\d{5}\/[a-f0-9-]+\/browserLink/.test(message));
                }
                return false;
            };

            console.error = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalError.apply(console, [message, ...args]);
                }
            };

            console.warn = function(message, ...args) {
                if (!isBrowserLinkError(message)) {
                    originalWarn.apply(console, [message, ...args]);
                }
            };

            // Suppress fetch errors for Browser Link
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string' && url.includes('browserLinkSignalR')) {
                    // Return a rejected promise silently
                    return Promise.reject(new Error('Browser Link request suppressed'));
                }
                return originalFetch.apply(window, [url, options]);
            };

            // Block Browser Link WebSocket connections
            const OriginalWebSocket = window.WebSocket;
            window.WebSocket = function(url, protocols) {
                if (typeof url === 'string' && url.includes('browserLink')) {
                    console.log('Browser Link WebSocket connection blocked');
                    throw new Error('Browser Link WebSocket blocked');
                }
                return new OriginalWebSocket(url, protocols);
            };

            console.log('[Browser Link Suppression] Browser Link CORS errors are being filtered out');
        }
    </script>

                myConfetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);

                    setTimeout(() => { myConfetti.reset(); if (canvas.parentNode) canvas.remove(); }, 3000);

        (function () {
            var _s = {

                // Hash + value noise (explicit float literals for GLSL ES 1.0 compliance)

                // SSBU color ramp: black→blood-red base → vivid orange body → bright yellow tips

                'vec4 fc(float t){',

                '  vec3 c=vec3(0.0,0.0,0.0);',

                // Edge flame — d=dist from edge (0=at edge), a=pos along edge, o=time phase

                '  vec2 q=vec2(a*9.0+n(vec2(a*5.0,t*0.7))*0.9,t*3.0);',

                // 8 ember sparks drifting inward from each edge
                'float em(vec2 uv,float t){float r=0.0;',
                'for(int i=0;i<8;i++){',
                '  float fi=float(i);vec2 s=vec2(fi*4.7,fi*2.3+1.1);',

                '  vec2 pos=vec2(ep+dr*pr*6.0,pr*0.26+0.01);',              // default: bottom edge

                '  else if(sd>=2.0&&sd<3.0)pos=vec2(pr*0.26+0.01,ep+dr*pr*6.0);', // left
                '  else if(sd>=3.0)pos=vec2(1.0-pr*0.26-0.01,ep+dr*pr*6.0);',     // right

                '  float glow=0.42*exp(-md*7.0);',                          // soft ambient bloom
                '  vec4 col=fc(i);',
                '  col.rgb=mix(col.rgb,vec3(0.78,0.12,0.0),glow*(1.0-col.a)*0.55);',

            function compile(gl, type, src) {
                var s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))

            function initGL(canvas) {
                _s.gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false })
                    || canvas.getContext('experimental-webgl', { alpha: true, premultipliedAlpha: false });
                if (!_s.gl) return false;
                var gl = _s.gl;
                var vs = compile(gl, gl.VERTEX_SHADER, VS);
                var fs = compile(gl, gl.FRAGMENT_SHADER, FS);
                _s.prog = gl.createProgram();
                gl.attachShader(_s.prog, vs); gl.attachShader(_s.prog, fs);
                gl.linkProgram(_s.prog);

                gl.useProgram(_s.prog);
                _s.buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, _s.buf);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
                var ap = gl.getAttribLocation(_s.prog, 'p');

                _s.uTime = gl.getUniformLocation(_s.prog, 'u_time');
                _s.uRes = gl.getUniformLocation(_s.prog, 'u_res');

                gl.clearColor(0, 0, 0, 0);
                return true;

            function resize() {
                if (!_s.canvas || !_s.gl) return;
                var par = _s.canvas.parentElement;
                if (!par) return;
                var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
                var w = Math.floor(par.clientWidth * dpr) || 1;
                var h = Math.floor(par.clientHeight * dpr) || 1;
                if (_s.canvas.width !== w || _s.canvas.height !== h) {
                    _s.canvas.width = w; _s.canvas.height = h;
                    _s.gl.viewport(0, 0, w, h);
                }
            }

            function render() {
                if (!_s.running || !_s.gl) return;
                var t = (performance.now() - _s.t0) / 1000;
                _s.gl.clear(_s.gl.COLOR_BUFFER_BIT);
                _s.gl.uniform1f(_s.uTime, t);
                _s.gl.uniform2f(_s.uRes, _s.canvas.width, _s.canvas.height);
                _s.gl.drawArrays(_s.gl.TRIANGLE_STRIP, 0, 4);
                _s.raf = requestAnimationFrame(render);
            }

            window.startFireEffect = function (canvasId) {
                if (_s.running) return; // idempotent
                var c = document.getElementById(canvasId);
                if (!c) { console.warn('[Fire] canvas not found:', canvasId); return; }
                _s.canvas = c;
                c.style.display = 'block'; // show first so layout dimensions are available
                if (!_s.gl && !initGL(c)) { c.style.display = 'none'; return; }
                resize();
                if (window.ResizeObserver) {
                    _s.obs = new ResizeObserver(resize);
                    _s.obs.observe(c.parentElement);
                } else {
                    window.addEventListener('resize', resize);
                }
                _s.running = true;
                _s.t0 = performance.now();
                _s.raf = requestAnimationFrame(render);
            };

            window.stopFireEffect = function () {
                if (!_s.running) return; // idempotent
                _s.running = false;
                if (_s.raf) { cancelAnimationFrame(_s.raf); _s.raf = null; }
                if (_s.obs) { _s.obs.disconnect(); _s.obs = null; }
                else { window.removeEventListener('resize', resize); }
                if (_s.canvas) _s.canvas.style.display = 'none';
                // Keep GL resources alive for the next frenzy — avoids recompile cost
            };

            window.destroyFireEffect = function () {
                window.stopFireEffect();
                if (_s.gl) {
                    if (_s.buf) { _s.gl.deleteBuffer(_s.buf); _s.buf = null; }
                    if (_s.prog) { _s.gl.deleteProgram(_s.prog); _s.prog = null; }

                }
                _s.canvas = null; _s.uTime = null; _s.uRes = null;
